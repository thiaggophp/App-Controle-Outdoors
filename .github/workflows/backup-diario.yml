name: Backup Diário

on:
  schedule:
    - cron: '0 6 * * *'  # 3h BRT (6h UTC) todo dia
  workflow_dispatch:       # permite rodar manualmente também

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Executar backup no VPS
        id: backup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            /usr/local/bin/backup-apps.sh

      - name: Email — sucesso
        if: success()
        run: |
          DATA=$(date '+%d/%m/%Y às %H:%M')
          curl -s -X POST "https://api.emailjs.com/api/v1.0/email/send" \
            -H "Content-Type: application/json" \
            -d '{
              "service_id": "service_d0uex69",
              "template_id": "template_nzuzzgq",
              "user_id": "5R9ZxFkk-UzbIXlGh",
              "template_params": {
                "to_name": "Thiago",
                "to_email": "thiaggotx@gmail.com",
                "temp_password": "'"✅ Backup realizado com sucesso em ${DATA}. Arquivos salvos em /var/backups/apps/ no servidor (retenção 7 dias)."'",
                "app_name": "Backup Automático"
              }
            }'

      - name: Email — erro
        if: failure()
        run: |
          DATA=$(date '+%d/%m/%Y às %H:%M')
          curl -s -X POST "https://api.emailjs.com/api/v1.0/email/send" \
            -H "Content-Type: application/json" \
            -d '{
              "service_id": "service_d0uex69",
              "template_id": "template_nzuzzgq",
              "user_id": "5R9ZxFkk-UzbIXlGh",
              "template_params": {
                "to_name": "Thiago",
                "to_email": "thiaggotx@gmail.com",
                "temp_password": "'"⚠️ ATENÇÃO: O backup automático FALHOU em ${DATA}. Acesse https://github.com/thiaggophp/App-Controle-Outdoors/actions para verificar o erro."'",
                "app_name": "Backup Automático — ERRO"
              }
            }'
