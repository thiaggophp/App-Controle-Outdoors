name: Backup Diário

on:
  schedule:
    - cron: '0 6 * * *'  # 3h BRT (6h UTC) todo dia
  workflow_dispatch:       # permite rodar manualmente também

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Executar backup no VPS
        id: backup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            /usr/local/bin/backup-apps.sh

      - name: Email — sucesso
        if: success()
        run: |
          DATA=$(date '+%d/%m/%Y às %H:%M')
          curl -s -X POST "https://mail.vexasistemas.com.br/notify-signup" \
            -H "Content-Type: application/json" \
            -d "{
              \"requester_name\": \"✅ Backup concluído em ${DATA}\",
              \"requester_email\": \"Arquivos salvos em /var/backups/apps/ no servidor. Retenção: 7 dias.\",
              \"app_name\": \"Backup Automático — Apps\"
            }"

      - name: Email — erro
        if: failure()
        run: |
          DATA=$(date '+%d/%m/%Y às %H:%M')
          curl -s -X POST "https://mail.vexasistemas.com.br/notify-signup" \
            -H "Content-Type: application/json" \
            -d "{
              \"requester_name\": \"❌ Backup FALHOU em ${DATA}\",
              \"requester_email\": \"Acesse https://github.com/thiaggophp/App-Controle-Outdoors/actions para ver o erro.\",
              \"app_name\": \"Backup Automático — ERRO\"
            }"
